#------------------------------------------------------------------------------
# Core Experiment Settings
#------------------------------------------------------------------------------
hydra:
  output_subdir: null
  run:
    dir: ${experiment_base_dir}/hydra_output

seed: 42
experiment_base_dir: experiments/${data.dataset}/${experiment_name}/seed_${seed}
root_directory: ${experiment_base_dir}/NePS_output
experiment_name: test_desmoid

#------------------------------------------------------------------------------
# NePS Optimization Settings
#------------------------------------------------------------------------------
pipeline_space: configs/pipeline_spaces/baseline.yaml
max_evaluations: 50       # Maximum number of configurations to evaluate
metric: f1                # Metric to optimize: 'f1' (default), 'accuracy', 'precision', or 'recall'
searcher: random_search   # Options: 'default', 'bayesian_optimization', 'random_search', 'hyperband', 'priorband', 'mobster', 'asha', 'regularized_evolution'

#------------------------------------------------------------------------------
# Model Architecture
#------------------------------------------------------------------------------
model:
  type: resnet            # Model architecture type
  task: classification    # Type of machine learning task

#------------------------------------------------------------------------------
# Dataset Configuration
#------------------------------------------------------------------------------
data:
  dataset: desmoid        # Name of the dataset
  path: datasets          # Path to the dataset
  debug_mode: False       # Enable/disable debug mode
  num_workers: 4          # Number of parallel data loading workers
  augmentation_type: medical   # Type of augmentation to use ('medical' or 'trivial')

#------------------------------------------------------------------------------
# Experiment Monitoring & Checkpointing
#------------------------------------------------------------------------------
logging:
  eval_every: 1           # Evaluate model every N epochs
  save_every: 100         # Save model checkpoint every N epochs
