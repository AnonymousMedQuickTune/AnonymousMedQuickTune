# voxel_calculation:
#   type: categorical
#   choices: ["mean", "median", "isotropic", "volumetric_isotropic"]
#   # prior: "median"
#   # prior_confidence: "low"

learning_rate:
  type: float
  log: true
  lower: 1e-5
  upper: 1e-2
  # prior: 1e-4
  # prior_confidence: "low"

gradient_accumulation_steps: 
  type: int
  lower: 1
  upper: 2  # limit to max effective batch size (batch_size × gradient_accumulation_steps ≤ 8)
  # prior: 1
  # prior_confidence: "low"
  
optimizer_type:
  type: categorical
  choices: ["adam", "adamw", "sgd"]
  # prior: "adam"
  # prior_confidence: "low"

weight_decay:
  type: float
  log: true
  lower: 1e-6
  upper: 1e-3
  # prior: 1e-6
  # prior_confidence: "low"

scheduler_type:
  type: categorical
  choices: ["warmup", "cosine_warmup"]
  # prior: "warmup"
  # prior_confidence: "low"

warmup_epochs:
  type: int
  lower: 0
  upper: 5
  # prior: 0
  # prior_confidence: "low"

label_smoothing:
  type: float
  log: false
  lower: 0.0
  upper: 0.2
  # prior: 0.0
  # prior_confidence: "low"

mixup_alpha:
  type: float
  log: false
  lower: 0.0
  upper: 0.4
  # prior: 0.0
  # prior_confidence: "low"

batch_size:
  type: int
  lower: 1
  upper: 4
  # prior: 1
  # prior_confidence: "low"
